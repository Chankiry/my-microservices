input {
  # Receive logs from Filebeat agents (running as sidecars or DaemonSet)
  beats {
    port => 5044
  }

  # Receive JSON logs directly via TCP (NestJS winston transport)
  tcp {
    port => 5000
    codec => json
  }
}

filter {
  # Parse timestamp if present
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Add environment tag
  mutate {
    add_field => { "environment" => "development" }
  }

  # Tag microservice logs
  if [service] {
    mutate {
      add_tag => ["microservice"]
    }
  }

  # Tag error logs
  if [level] == "error" {
    mutate {
      add_tag => ["error"]
    }
  }

  # Remove internal Logstash fields to keep logs clean
  mutate {
    remove_field => ["host", "agent", "ecs", "input", "log"]
  }
}

output {
  # Send to Elasticsearch — one index per service per day
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "logs-%{[service]:unknown}-%{+YYYY.MM.dd}"
  }

  # Also print to stdout for debugging during development
  stdout {
    codec => rubydebug
  }
}