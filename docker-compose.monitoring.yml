# MONITORING & OBSERVABILITY STACK
# Run with: docker compose -f docker-compose.monitoring.yml up -d
# Stop with: docker compose -f docker-compose.monitoring.yml down
#
# Requires core infrastructure to be running first:
# docker compose up -d
#
# Services in this file talk to core services via
# the shared external network: microservices-network

services:
  # ==========================================
  # ELK Stack (Centralized Logging)
  # ==========================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.0
    container_name: microservices-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=microservices-cluster
      - node.name=elasticsearch-node-1
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  logstash:
    image: docker.elastic.co/logstash/logstash:9.3.0
    container_name: microservices-logstash
    ports:
      - "5044:5044"
      - "5000:5000"
      - "9600:9600"
    volumes:
      - ./docker/logstash/pipeline:/usr/share/logstash/pipeline
      - ./docker/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml
      - logstash_data:/usr/share/logstash/data
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9600 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.0
    container_name: microservices-kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      xpack.security.enabled: "false"
    volumes:
      - kibana_data:/usr/share/kibana/data
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==========================================
  # Metrics (Prometheus + Grafana)
  # ==========================================
  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: microservices-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - microservices-network

  grafana:
    image: grafana/grafana:12.3
    container_name: microservices-grafana
    ports:
      - "4001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - microservices-network

  # ==========================================
  # Distributed Tracing (Jaeger)
  # ==========================================
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: microservices-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "14250:14250"   # gRPC collector
      - "14268:14268"   # HTTP collector
      - "6831:6831/udp" # UDP agent
      - "4317:4317"     # OTLP gRPC (OpenTelemetry)
      - "4318:4318"     # OTLP HTTP (OpenTelemetry)
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - microservices-network

# ==========================================
# Volumes (monitoring-owned)
# ==========================================
volumes:
  elasticsearch_data:
  logstash_data:
  kibana_data:
  prometheus_data:
  grafana_data:

# ==========================================
# Networks
# Must reference the same network as core
# docker-compose.yml — declared as external
# ==========================================
networks:
  microservices-network:
    name: my-microservices_microservices-network
    external: true