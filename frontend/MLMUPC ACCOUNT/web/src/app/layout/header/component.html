<!-- Loading bar -->
<helper-loading-bar></helper-loading-bar>

<!-- Wrapper -->
<div class="flex w-full min-h-screen flex-col">
    <!-- Header -->
    <div class="bg-card sticky top-0 z-49 flex h-14 w-full flex-0 items-center pl-2 lg:pl-4 pr-4 shadow dark:border-b dark:shadow-none print:hidden">
        <!-- Top Header with Logo -->
        <div class="flex-shrink-0 border-b flex items-center justify-between">
            <div class="flex items-center gap-3">
              <img class="hidden sm:block h-12 w-auto" src="images/logo/MLMUPC_Logo_Text_Right.png" />
              <img class="block sm:hidden h-24 w-auto mt-4" src="images/logo/MLMUPC_Logo_Text_Bottom.png" />
            </div>
        </div>
        <!-- <span class="text-2xl text-slate-900 font-medium"> {{ "Role.Admin" | transloco }}</span> -->
        <!-- Components -->
        <div class="h-12 ml-auto flex items-center space-x-0.5 sm:space-x-2">
            <!-- <scheme></scheme> -->
            <!-- <notifications></notifications> -->
            <languages></languages>
            <helper-fullscreen [tooltip]="activeLang === 'kh' ? 'បិទបើកអេក្រង់ពេញ' : 'Toggle Fullscreen'" class="hidden md:block"/>
            <user></user>
        </div>
    </div>

    <!-- Content -->
    <div class="flex-grow">
        @if (true) {
        <router-outlet></router-outlet>
        }
    </div>

</div>
