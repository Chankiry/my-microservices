<div class="profile-container">

    <div class="w-full aspect-[2/1] max-h-[220px] h-[220px] min-h-[220px]">
        <img [src]="backgroundImage" alt="Temple background" class="w-full h-full object-cover" loading="eager">
    </div>

    <!-- Main Content Wrapper -->
    <div class="mx-auto max-w-[80%]">
        <!-- Profile Card Section -->
        <div class="flex justify-between flex-col md:flex-row md:items-start gap-2 -mt-16 relative z-10 rounded-lg mb-8">
            <div class="flex gap-4">
                <!-- Avatar -->
                <div class="relative w-32 h-32 flex-shrink-0">
                    <img [src]="profileImage" alt="Profile avatar" class="w-full h-full rounded-full object-cover border-4 border-[#0DA487]">
                    <div class="absolute -bottom-1 -right-1 w-10 h-10 bg-[#0DA487] rounded-full flex items-center justify-center p-2">
                        <mat-icon
                            svgIcon="mdi:shield-check"
                            class="h-8 w-8 flex-shrink-0 text-white">
                        </mat-icon>
                    </div>
                </div>

                <!-- User Info -->
                <div class="flex-1 mt-16">
                    <div class="flex flex-col items-baseline mb-1">
                        <h1 class="text-3xl font-semibold text-gray-900">{{ profileName }}</h1>
                        <span class="text-gray-600">{{ profileNameEN }}</span>
                    </div>
                    <div class="flex flex-wrap gap-4 text-sm text-gray-600">
                        <span class="flex items-center gap-1">
                            <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                            </svg>
                            {{ phone }}
                        </span>
                        <span class="flex items-center gap-1">
                            <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                            </svg>
                            {{ email }}
                        </span>
                    </div>
                </div>
            </div>
            <!-- Action -->
            <div class="inline-flex self-center bg-white rounded-xl -mt-0 md:-mt-[20px]">
                <!-- Request Button -->
                <button mat-stroked-button
                        class="min-w-[136px] flex items-center gap-2 px-4 rounded-xl rounded-r-none hover:shadow-[0_4px_6px_-1px_rgba(0,0,0,0.1),0_2px_4px_-2px_rgba(0,0,0,0.1)]"
                        >
                    <mat-icon class="icon-size-5" svgIcon="mdi:file-edit-outline"></mat-icon>
                    <div class="flex items-center gap-2">
                        <span class="flex text-base">{{ "សំណើសុំច្បាប់" | transloco }}</span>
                    </div>
                </button>

                <!-- Download Button -->
                <button mat-stroked-button
                        class="min-w-[136px] flex items-center gap-2 px-4 rounded-xl rounded-l-none hover:shadow-[0_4px_6px_-1px_rgba(0,0,0,0.1),0_2px_4px_-2px_rgba(0,0,0,0.1)]"
                        >
                    <mat-icon class="icon-size-5" svgIcon="mdi:download-outline"></mat-icon>
                    <div class="flex items-center gap-2">
                        <span class="flex text-base">{{ "ទាញយក" | transloco }}</span>
                    </div>
                </button>

            </div>

        </div>

        <!-- Services Section -->
        <section class="mb-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div *ngFor="let service of services" class="flex flex-col border-2 border-gray-200 rounded-3xl transition0 justify-between ">
                    <div class="flex items-start justify-start p-5 w-full gap-4">
                        <div class="flex items-center justify-center p-2 mb-4 rounded-full bg-gray-200">
                            <mat-icon
                                [svgIcon]="service.icon"
                                [style.color]="service.color || '#0ea5e9'"
                                class="h-16 w-16 flex-shrink-0">
                            </mat-icon>
                        </div>
                    <div class="flex flex-col items-start">
                        <h3 class="text-3xl font-medium text-gray-900 mb-2">{{ service.title }}</h3>
                        <p class="text-lg text-gray-800 mb-4 leading-relaxed">{{ service.description }}</p>
                    </div>
                    </div>
                    <button mat-flat-button class="ml-auto flex items-center justify-end mt-2 text-blue-500 rounded-full">
                        <div class="flex items-center gap-2">
                            មើលលម្អិត
                            <mat-icon svgIcon="mdi:chevron-right" class="w-5 h-5 text-blue-500"></mat-icon>
                        </div>
                    </button>
                </div>
            </div>
        </section>

        <!-- System Icons Section -->
        <section class="mb-8">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold text-gray-900">កម្មវិធីឌីជីថល នៃ ដ.ន.ស.</h2>
                <button mat-flat-button class="rounded-full text-gray-600 p-2">
                    <mat-icon svgIcon="mdi:chevron-right" class="w-6 h-6 flex-shrink-0"></mat-icon>
                </button>
            </div>

            <!-- Scroll Container with full edge visibility -->
            <div class="relative overflow-x-auto scrollbar-hide pb-6 -mx-[12.5%] px-[10%]">
                <div class="flex gap-6 min-w-max px-6">   <!-- Important: px-6 here -->
                    <div *ngFor="let system of systems"
                        class="flex flex-col items-center gap-2 flex-shrink-0">

                    <button color="primary"
                            class="system-button flex items-center justify-center
                                    min-h-14 min-w-14 max-h-14 max-w-14
                                    bg-white shadow-sm hover:shadow-md transition-shadow">
                        <mat-icon svgIcon="mdi:tag-outline" class="icon-size-8"></mat-icon>
                    </button>

                    <p class="text-xs text-gray-600 text-center w-16 line-clamp-2">
                        {{ system.name }}
                    </p>
                    </div>
                </div>
            </div>
        </section>
