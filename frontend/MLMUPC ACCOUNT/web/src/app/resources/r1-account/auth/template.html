<div class="w-full h-[100dvh] flex overflow-hidden bg-white">

    <!-- Left Panel - Form -->
    <div class="flex-1 flex flex-col bg-white overflow-y-auto">

        <!-- Top Header with Logo -->
        <div class="flex-shrink-0 border-b border-gray-200 p-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
              <img class="hidden sm:block h-16 w-auto" src="images/logo/MLMUPC_Logo_Text_Right.png" />
              <img class="block sm:hidden h-30 w-auto mt-4" src="images/logo/MLMUPC_Logo_Text_Bottom.png" />
            </div>
            <languages></languages>
        </div>

        <!-- Form Content - router-outlet renders sign-in or sign-up here -->
        <div class="flex-1 flex flex-col overflow-y-auto">
            <div class="px-50 py-6 flex items-center justify-center h-full">
                <router-outlet></router-outlet>
            </div>
        </div>

        <!-- Bottom Footer - Contact & Social -->
        <div class="flex-shrink-0 border-t border-gray-200 p-6 text-xs">
            <div class="flex flex-col gap-3">
                <div class="flex gap-1.5">
                    <mat-icon svgIcon="mdi:map-marker" class="h-4 w-4 text-cyan-600 flex-shrink-0"></mat-icon>
                    <span class="text-xs text-cyan-600">
                        JVJF+5F, ដីឡូត៌លេខ ២០០៥, Phnom Penh
                    </span>
                </div>

                <!-- Social Icons -->
                <div class="flex gap-3">
                    <a href="https://www.facebook.com/mlmupc.pressteam" class="text-gray-400 hover:text-cyan-600">
                        <mat-icon svgIcon="logos:facebook" class="text-primary h-4 w-4"></mat-icon>
                    </a>
                    <a href="https://t.me/MLMUPCofCambodia" class="text-gray-400 hover:text-cyan-600">
                        <mat-icon svgIcon="logos:telegram" class="text-primary h-4 w-4"></mat-icon>
                    </a>
                    <a href="https://https//x.com/mlmupc" class="text-gray-400 hover:text-cyan-600">
                        <mat-icon svgIcon="mdi:twitter" class="text-primary h-4 w-4"></mat-icon>
                    </a>
                    <a href="https://www.youtube.com/@MLMUPC_KH" class="text-gray-400 hover:text-cyan-600">
                        <mat-icon svgIcon="logos:youtube-icon" class="text-primary h-4 w-4"></mat-icon>
                    </a>
                </div>
            </div>
        </div>

    </div>

    <!-- Right Panel - Background Image with Overlay -->
    <div class="hidden lg:flex flex-1 relative bg-cover bg-center"
         [style.backgroundImage]="'url(images/background/front-background.JPG)'">

        <!-- Overlay Gradient -->
        <div class="absolute inset-0 bg-gradient-to-b from-gray-900/30 via-gray-900/50 to-gray-900/70"></div>

        <!-- Content Overlay -->
        <div class="relative z-10 px-30 flex flex-col items-start justify-center w-full h-full text-white">

            <!-- User Icon Badge -->
            <div class="mb-12 bg-[#02adef] bg-opacity-60 border-[3px] border-[#02adef] rounded-full flex items-center justify-center p-4">
                <img class="h-24 w-24 object-contain drop-shadow-lg" src="images/icons/Account.png" alt="Account Icon" />
            </div>

            <!-- Text Content -->
            <div class="text-start mb-20">
                <h1 class="text-5xl font-semibold">ស្វាគមន៍មកកាន់</h1>
                <h1 class="text-5xl font-semibold">ប្រព័ន្ធគ្រប់គ្រងគណនីឌីជីថល ដ.ន.ស.</h1>
                <h1 class="text-5xl font-semibold">Account Management System</h1>
            </div>


            <!-- Bottom Logo -->
            <div class="absolute bottom-30 left-0 right-0 flex justify-center items-end">
                <img class="h-18 w-18 object-contain drop-shadow-lg" src="images/logo/MLMUPC_Logo.png" alt="Logo" />
            </div>

            <!-- Feature Icons at Bottom -->
            <div class="absolute bottom-8 left-0 right-0 flex justify-center items-end gap-3 px-8">
                <div class="flex items-center justify-center w-15 h-15 rounded-lg bg-white backdrop-blur-sm text-white">
                    <img src="images/icons/LRS.png" alt="LRS Icon" class="h-10 w-10"/>
                </div>
                <div class="flex items-center justify-center w-15 h-15 rounded-lg bg-white backdrop-blur-sm text-white">
                    <img src="images/icons/Express.png" alt="Express Icon" class="h-10 w-10"/>
                </div>
                <div class="flex items-center justify-center w-15 h-15 rounded-lg bg-white backdrop-blur-sm text-white">
                    <img src="images/icons/Express.png" alt="Express Icon" class="h-10 w-10"/>
                </div>
                <div class="flex items-center justify-center w-15 h-15 rounded-lg bg-white backdrop-blur-sm text-white">
                    <img src="images/icons/People Center.png" alt="People Center Icon" class="h-10 w-10"/>
                </div>
                <div class="flex items-center justify-center w-15 h-15 rounded-lg bg-white backdrop-blur-sm text-white">
                    <img src="images/icons/PLT.png" alt="PLT Icon" class="h-10 w-10"/>
                </div>
                <div class="flex items-center justify-center w-15 h-15 rounded-lg bg-white backdrop-blur-sm text-white">
                    <img src="images/icons/Construction.png" alt="Construction Icon" class="h-10 w-10"/>
                </div>
            </div>

        </div>

    </div>

</div>
