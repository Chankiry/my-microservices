<div class="dark:bg-transparent justify-between gap-4 px-3 flex flex-col w-full h-[34.4rem] motion-ease-spring-smooth motion-preset-fade-sm motion-duration-200">
    <!-- form description -->
    <div class="my-4 flex flex-col gap-2 items-center sm:pt-10">
        <div class="p-3 bg-gray-100 w-22 h-22 flex items-center justify-center rounded-full scale-90 md:scale-100">
            <mat-icon class="icon-size-[60px] text-black" [svgIcon]="'mdi:login'"></mat-icon>
        </div>
        <span class="text-xl md:text-3xl w-fit font-medium text-center">របៀបចូលគណនី </span>
        <span class="font-normal pl-2 text-lg text-center text-gray-500">សូមជ្រើសរើសវិធីសាស្ត្រដើម្បីចូលគណនីរបស់លោកអ្នក</span>
    </div>
    <div class="flex gap-1 flex-col justify-end h-full">

        <!-- QR Code -->
        <div (click)="openQrDialog()" class="flex hover:cursor-pointer px-3 py-3 gap-3 items-center border border-gray-200 dark:border-gray-700 rounded-lg dark:bg-background-dark-2 mb-2">
            <mat-icon class="icon-size-12 text-[#2b52a0] dark:text-blue-300" [svgIcon]="'mdi:qrcode'"></mat-icon>
            <div class="font-medium text-base text-start">
                ស្កេន QR Code <br/>
                <span class="font-normal text-sm">ចូលប្រព័ន្ធដោយស្កេន QR Code</span>
            </div>
        </div>

        <!-- PLT Password Login -->
        <div [routerLink]="['/auth/sign-in']" class="flex px-3 py-3 gap-3 hover:cursor-pointer items-center border border-gray-200 dark:border-gray-700 rounded-lg dark:bg-background-dark-2">
            <mat-icon class="icon-size-12 text-[#2b52a0] dark:text-blue-300" [svgIcon]="'mdi:lock'"></mat-icon>
            <div class="font-medium text-base text-start">
                ពាក្យសម្ងាត់ <br/>
                <span class="font-normal text-sm">ចូលប្រព័ន្ធដោយប្រើលេខទូរស័ព្ទ ឬអ៊ីមែល និង OTP</span>
            </div>
        </div>

        <div class="flex items-center justify-center w-full py-2 text-gray-500">
            <span>ឬ</span>
        </div>

        <!-- Platform Login (new) -->
        <div [routerLink]="['/auth/platform-sign-in']" class="flex px-3 py-3 gap-3 hover:cursor-pointer items-center border border-gray-200 dark:border-gray-700 rounded-lg dark:bg-background-dark-2">
            <mat-icon class="icon-size-12 text-[#2b52a0] dark:text-blue-300" [svgIcon]="'mdi:shield-account'"></mat-icon>
            <div class="font-medium text-base text-start">
                ចូលប្រព័ន្ធវេទិកា <br/>
                <span class="font-normal text-sm">ចូលប្រព័ន្ធដោយប្រើគណនីវេទិកា (Platform Account)</span>
            </div>
        </div>

        <div class="flex items-center justify-center w-full py-2 text-gray-500">
            <span>ឬ</span>
        </div>

        <!-- Create Account -->
        <div (click)="navigateToVerifyEmail()" class="flex px-3 py-3 gap-3 hover:cursor-pointer items-center border border-gray-200 dark:border-gray-700 rounded-lg dark:bg-background-dark-2">
            <mat-icon class="icon-size-12 text-[#2b52a0] dark:text-blue-300" [svgIcon]="'mdi:account-plus'"></mat-icon>
            <div class="font-medium text-base text-start">
                បង្កើតគណនី <br/>
                <span class="font-normal text-sm">គណនីសមាជិក អ.ម.ត ថ្មី</span>
            </div>
        </div>

    </div>
</div>
