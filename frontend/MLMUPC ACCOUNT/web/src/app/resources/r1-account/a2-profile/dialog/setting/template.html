<div class="min-h-14 max-h-14 flex gap-2 px-3 justify-between items-center border-b border-gray-300 dark:border-gray-700">
    <span class="font-semibold text-lg">ការកំណត់</span>
    <div class="flex items-center gap-2">       
        <div class="flex items-center cursor-pointer">
            <button [mat-dialog-close]="false" mat-icon-button>
                <mat-icon svgIcon="heroicons_outline:x-mark" />
            </button>
        </div>
    </div>
</div>
<div  class="opacity-30 pointer-events-none p-4" aria-disabled="true">
    <div class="border rounded-lg border-gray-300 dark:border-gray-700">
        
        <div class="flex gap-3 p-3 border-b items-center border-gray-300 dark:border-gray-700">
            <mat-icon class="icon-size-6" svgIcon="mat_outline:palette"></mat-icon>
            <div class="flex flex-1 gap-1 justify-between items-center">
                <span class="text-lg">រូបរាង</span>
                <div class="flex items-center gap-1 w-fit">
                    <button class="mt-1 size-7 hover:bg-gray-100 rounded-full">
                        <mat-icon svgIcon="mdi:chevron-right" />
                    </button>
                </div>
            </div>
        </div>

        <div class="flex gap-3 p-3 border-b items-center border-gray-300 dark:border-gray-700">
            <img class="size-7" src="images/logo/telegram-icon.svg" alt="Avatar" />
            <div class="flex flex-1 gap-1 justify-between items-center">
                <span class="text-lg">Telegram</span>
                <div class="flex items-center gap-1 w-fit">
                    <div class="p-1 px-3 bg-green-300/50 dark:bg-green-200/30 rounded-full text-green-600 dark:text-green-400 text-base">ភ្ចាប់</div>
                    <button class="mt-1 size-7 hover:bg-gray-100 rounded-full">
                        <mat-icon svgIcon="mdi:chevron-right" />
                    </button>
                </div>
            </div>
        </div>
        <div class="flex gap-3 p-3 border-b items-center border-gray-300 dark:border-gray-700" >
            <img class="size-7" src="images/logo/google-drive-color-icon.svg" alt="Avatar" />
            <div class="flex flex-1 gap-1 justify-between items-center">
                <span class="text-lg">Google Drive</span>
                <div class="flex items-center gap-1 w-fit">
                    <div class="p-1 px-3 bg-green-300/50 dark:bg-green-200/30 rounded-full text-green-600 dark:text-green-400 text-base">ភ្ចាប់</div>
                    <button class="mt-1 size-7 hover:bg-gray-100 rounded-full">
                        <mat-icon svgIcon="mdi:chevron-right" />
                    </button>
                </div>
            </div>
        </div>
        <div class="flex gap-3 p-3 border-b items-center border-gray-300 dark:border-gray-700">
            <img class="size-7" src="images/logo/google-calendar-icon.svg" alt="Avatar" />
            <div class="flex flex-1 gap-1 justify-between items-center">
                <span class="text-lg">Google Calendar</span>
                <div class="flex items-center gap-1 w-fit">
                    <button class="mt-1 size-7 hover:bg-gray-100 rounded-full">
                        <mat-icon svgIcon="mdi:chevron-right" />
                    </button>
                </div>
            </div>
        </div>
        <div class="flex gap-3 p-3 border-b items-center border-gray-300 dark:border-gray-700">
            <img class="size-7" src="images/logo/jira-1.svg" alt="Avatar" />
            <div class="flex flex-1 gap-1 justify-between items-center">
                <span class="text-lg">Jira</span>
                <div class="flex items-center gap-1 w-fit">
                    <button class="mt-1 size-7 hover:bg-gray-100 rounded-full">
                        <mat-icon svgIcon="mdi:chevron-right" />
                    </button>
                </div>
            </div>
        </div>
        <div class="flex gap-3 p-3 border-b items-center border-gray-300 dark:border-gray-700">
            <img class="size-7" src="images/logo/dropbox-icon.svg" alt="Avatar" />
            <div class="flex flex-1 gap-1 justify-between items-center">
                <span class="text-lg">Dropbox</span>
                <div class="flex items-center gap-1 w-fit">
                    <button class="mt-1 size-7 hover:bg-gray-100 rounded-full">
                        <mat-icon svgIcon="mdi:chevron-right" />
                    </button>
                </div>
            </div>
        </div>
    
    </div>
</div>
