<div class="flex flex-col w-full min-w-[380px] max-w-[460px]">

    <!-- Header -->
    <div class="px-5 flex items-center justify-between h-16 border-b border-slate-200">
        <div class="flex items-center gap-2">
            <mat-icon svgIcon="mdi:account-edit-outline" class="text-[#0C7EA5]"></mat-icon>
            <span class="text-lg font-semibold text-gray-900">កែប្រែប្រវត្តិរូប</span>
        </div>
        <button mat-icon-button (click)="close()" [disabled]="isLoading">
            <mat-icon svgIcon="mdi:close"></mat-icon>
        </button>
    </div>

    <!-- Body -->
    <div class="px-5 py-6 flex flex-col gap-3">
        <form [formGroup]="form" class="flex flex-col gap-3" (ngSubmit)="submit()">

            <!-- Name EN (first + last) -->
            <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">ឈ្មោះ (អក្សរឡាតាំង)</p>
            <div class="grid grid-cols-2 gap-3">
                <mat-form-field appearance="outline">
                    <mat-label>នាម</mat-label>
                    <input matInput formControlName="first_name">
                    <mat-error *ngIf="form.get('first_name')?.hasError('required')">
                        ត្រូវការ
                    </mat-error>
                </mat-form-field>
                <mat-form-field appearance="outline">
                    <mat-label>គោត្ដនាម</mat-label>
                    <input matInput formControlName="last_name">
                    <mat-error *ngIf="form.get('last_name')?.hasError('required')">
                        ត្រូវការ
                    </mat-error>
                </mat-form-field>
            </div>

            <!-- Name KH -->
            <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">ឈ្មោះ (ភាសាខ្មែរ)</p>
            <mat-form-field appearance="outline" class="w-full">
                <mat-label>ឈ្មោះខ្មែរ</mat-label>
                <input matInput formControlName="name_kh">
            </mat-form-field>

            <!-- Name EN full -->
            <mat-form-field appearance="outline" class="w-full">
                <mat-label>ឈ្មោះអង់គ្លេស</mat-label>
                <input matInput formControlName="name_en">
            </mat-form-field>

        </form>
    </div>

    <!-- Footer -->
    <div class="px-5 pb-5 flex items-center justify-end gap-3">
        <button mat-stroked-button (click)="close()" [disabled]="isLoading">
            បោះបង់
        </button>
        <button mat-flat-button class="bg-[#0C7EA5] text-white"
                (click)="submit()"
                [disabled]="form.invalid || isLoading">
            <mat-progress-spinner *ngIf="isLoading" diameter="18" mode="indeterminate" class="mr-2">
            </mat-progress-spinner>
            {{ isLoading ? 'កំពុងរក្សាទុក...' : 'រក្សាទុក' }}
        </button>
    </div>

</div>
