syntax = "proto3";

package notification;

option go_package = "./proto;notificationpb";

// ============================================
// Message Definitions
// ============================================

message SendEmailRequest {
  string to = 1;
  string subject = 2;
  string template = 3;
  map<string, string> context = 4;
}

message SendEmailResponse {
  bool success = 1;
  string message_id = 2;
  string error = 3;
}

message SendNotificationRequest {
  string user_id = 1;
  string type = 2;  // email, push, sms
  string title = 3;
  string body = 4;
  map<string, string> data = 5;
}

message SendNotificationResponse {
  bool success = 1;
  string notification_id = 2;
  string error = 3;
}

message GetNotificationStatusRequest {
  string notification_id = 1;
}

message NotificationStatus {
  string id = 1;
  string status = 2;  // pending, sent, delivered, failed
  string created_at = 3;
  string sent_at = 4;
  string error = 5;
}

// ============================================
// Service Definition
// ============================================

service NotificationService {
  rpc SendEmail(SendEmailRequest) returns (SendEmailResponse);
  rpc SendNotification(SendNotificationRequest) returns (SendNotificationResponse);
  rpc GetNotificationStatus(GetNotificationStatusRequest) returns (NotificationStatus);
}